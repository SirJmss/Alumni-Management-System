name: alumni
description: "Alumni Management System - Flutter App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3

  csv: ^6.0.0
  excel: ^4.0.2
  file_picker: ^8.0.0+1

  # Image handling
  image_picker: ^1.1.2
  cached_network_image: ^3.4.0
  http: ^1.2.0

  # Date & formatting
  intl: ^0.19.0

  # Charts
  fl_chart: ^0.68.0
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

# ✅ This must be at the TOP LEVEL (no indentation)
flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/gallery/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/gallery/